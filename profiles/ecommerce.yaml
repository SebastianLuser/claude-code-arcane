type: addon

skills:
  # net-new (12)
  - commerce-data-model
  - cart-checkout
  - inventory-stock
  - order-lifecycle
  - payments-architecture
  - promotions-discounts
  - shipping-tax
  - product-listing
  - commerce-analytics
  - merchant-feed
  - storefront-architecture
  - subscription-billing
  # reutilizadas (existentes, relevantes a e-commerce)
  - stripe-integration-expert
  - page-cro
  - form-cro
  - schema-markup
  - seo-audit
  - analytics-tracking
  - pricing-strategy
  - ab-test-setup

name: infra
description: "DevOps/Platform/Ops — deploy, observability, secrets, rollback"
type: addon

skills:
  - observability
  - observability-ops
  - observability-setup
  - feature-flags
  - gate-check
  - terraform-init
  - start-service
  - deploy-staging
  - deploy-check
  - docker-setup
  - distributed-tracing
  - error-tracking
  - logging-setup
  - runbooks
  - rollback-strategy
  - release-announce
  - doc-rfc
  - aws-solution-architect
  - azure-cloud-architect
  - gcp-cloud-architect
  - helm-chart-builder
  - incident-commander
  - incident-response
  - git-worktree-manager

rules:
  universal:
    - infra-code
  gamedev:
    []

agents:
  - devops

permissions:
  allow:
    - "Bash(kubectl get*)"
    - "Bash(kubectl describe*)"
    - "Bash(docker ps*)"
    - "Bash(docker images*)"
  deny:
    []
